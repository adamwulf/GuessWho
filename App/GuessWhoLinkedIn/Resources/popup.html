<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* Sized for a phone sheet, not just a desktop popover (iOS-portable). */
    body { font: -apple-system-body, system-ui; margin: 0; padding: 16px; min-width: 280px; }
    h1 { font-size: 15px; margin: 0 0 12px; }
    button { font-size: 15px; padding: 10px 14px; width: 100%; border-radius: 10px; border: 0; background: #0a66c2; color: #fff; }
    button:disabled { opacity: 0.5; }
    pre { background: #f4f4f5; padding: 10px; border-radius: 8px; font-size: 12px; white-space: pre-wrap; word-break: break-word; margin-top: 12px; }
    /* Empty until popup.js writes a status/result into it. */
    pre:empty { display: none; }
    .err { color: #b00020; }

    /* Activity row: VISIBLE FROM FIRST PAINT (static HTML + CSS animation, no
       JS needed) so the popup reads as busy the instant it opens — the probe
       can take a second or more before the first progress update streams in,
       and a silent popup invites clicking away. popup.js updates the label as
       the run advances and adds .done when the run ends (either outcome). */
    #loading { display: flex; align-items: center; gap: 8px; margin: 0 0 8px; font-size: 13px; font-weight: 600; }
    #loading.done { display: none; }
    .spinner { width: 16px; height: 16px; flex: none; border-radius: 50%; border: 2px solid rgba(10, 102, 194, 0.25); border-top-color: #0a66c2; animation: gw-spin 0.8s linear infinite; }
    @keyframes gw-spin { to { transform: rotate(360deg); } }

    /* Loading progress: shown only while a probe is scrolling the page in.
       The count lives in the #loading label; this is just the checklist. */
    #progress { margin-top: 4px; display: none; }
    #progress.active { display: block; }
    #progress ul { list-style: none; margin: 0; padding: 0; }
    #progress li { font-size: 13px; padding: 3px 0; display: flex; align-items: center; }
    #progress li .mark { width: 18px; display: inline-block; }
    #progress li.done { color: #1a7f37; }
    #progress li.pending { color: #6b6b70; }
    #progress li.done .mark::before { content: "✓"; }
    #progress li.pending .mark::before { content: "…"; }
  </style>
</head>
<body>
  <h1>Save to GuessWho</h1>
  <div id="loading">
    <span class="spinner" aria-hidden="true"></span>
    <span id="loading-label">Loading profile…</span>
  </div>
  <div id="progress">
    <ul id="progress-list"></ul>
  </div>
  <!-- The load starts automatically when the popup opens; this button is the
       user's escape hatch to stop waiting and send whatever parsed so far. It
       sits BELOW the loading indicators so it reads as "interrupt this", not
       "start". -->
  <button id="go">Save anyway</button>
  <pre id="out"></pre>
  <script src="popup.js"></script>
</body>
</html>
