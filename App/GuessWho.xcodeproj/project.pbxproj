			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# Builds the guesswho-cli tool from its sibling xcodeproj using an isolated\n# derived data path, then embeds the resulting binary into\n# GuessWho.app/Contents/MacOS/. Mirrors Muse's shipping\n# \"Build and Embed muse-mcp-server\" phase.\n#\n# Why this script (instead of an in-project target + Copy Files embed):\n#   The GuessWho target (Mac Catalyst, effective platform macosx) and the\n#   guesswho-cli tool (macOS, SDKROOT=macosx) both depend on the same SwiftPM\n#   packages (GuessWhoSync -> mcp-template -> swift-sdk -> EventSource ->\n#   swift-nio). When both targets live in the same xcodebuild invocation\n#   (whether in one xcodeproj or linked across projects via\n#   PBXTargetDependency), the SwiftPM Xcode planner emits two compile commands\n#   per shared C target (CNIODarwin, CNIOWASI, etc.) that both write to\n#   .../UninstalledProducts/macosx/<Target>.o. Archive build planning aborts\n#   with 'Multiple commands produce ...' before any compile runs. (Debug\n#   builds dodge it via per-target Products dirs.)\n#\n#   Running xcodebuild in a nested invocation (this script) gives the tool its\n#   own build planner with its own derived data, breaking the collision.\n\nset -e\n\n# Only embed the helper into Mac Catalyst builds. iOS device/simulator slices\n# don't ship guesswho-cli (INV-5 in plans/cli-mcp.md).\nif [ \"${IS_MACCATALYST}\" != \"YES\" ]; then\n    echo \"info: Skipping guesswho-cli build for non-Catalyst platform (IS_MACCATALYST=${IS_MACCATALYST})\"\n    exit 0\nfi\n\nTOOL_PROJECT=\"${SRCROOT}/guesswho-cli.xcodeproj\"\nif [ ! -d \"${TOOL_PROJECT}\" ]; then\n    echo \"error: guesswho-cli.xcodeproj not found at ${TOOL_PROJECT}\"\n    exit 1\nfi\n\n# Use an isolated derived data path OUTSIDE the archive intermediates so the\n# tool's SwiftPM build planner doesn't share modulemaps/object files with\n# GuessWho's build. Putting it under BUILD_DIR places it inside\n# ArchiveIntermediates/GuessWho/, which causes the nested xcodebuild to\n# inherit (and collide with) GuessWho's GeneratedModuleMaps for swift-nio C\n# targets.\nTOOL_DD=\"${TARGET_TEMP_DIR}/guesswho-cli-build\"\nmkdir -p \"${TOOL_DD}\"\n\n# Build the tool. Use the GuessWho configuration name; the tool project has\n# matching configurations (Debug/Release). A configuration added to the app\n# project without a matching one in guesswho-cli.xcodeproj fails here with\n# \"configuration not found\".\necho \"info: Building guesswho-cli (configuration=${CONFIGURATION}, host code-sign identity=${EXPANDED_CODE_SIGN_IDENTITY:-${CODE_SIGN_IDENTITY}})\"\necho \"info: Tool derived data path: ${TOOL_DD}\"\n\n# Run the nested xcodebuild with a sanitized environment. Stripping the parent\n# build's BUILD_DIR/OBJROOT/SYMROOT/etc. prevents the tool build from\n# inheriting GuessWho's archive intermediates location.\n#\n# Selective env forwarding for git/SwiftPM: CI setups that rewrite\n# https://github.com to SSH (url.insteadOf) need the ssh-agent socket to\n# survive into the env -i'd subshell, or nested package resolution fails with\n# \"Permission denied (publickey)\". Local dev clones over HTTPS (and the cache\n# is usually warm), so the agent isn't needed there.\n#\n# DEFENSIVE PATTERN: only forward variables that are actually set. A naked\n# `SSH_AUTH_SOCK=\"${SSH_AUTH_SOCK}\"` exports the variable as the empty string\n# when the parent doesn't have it. For SSH_AUTH_SOCK that happens to be\n# harmless (ssh treats an empty socket as no-agent), but for sibling vars it\n# is NOT harmless: GIT_SSH_COMMAND='' makes git exec the empty string as the\n# ssh program and die with \"error: cannot run : No such file or directory\"\n# before package resolution starts (this exact bug broke every Muse Catalyst\n# archive on CI). Build the forward list with positional params so each var\n# is only emitted when non-empty. Adding more forwards later? Keep them\n# inside the same conditional pattern -- never forward unconditionally.\nset --\nif [ -n \"${SSH_AUTH_SOCK}\" ]; then\n    set -- \"$@\" \"SSH_AUTH_SOCK=${SSH_AUTH_SOCK}\"\nfi\n\n# Diagnostic preamble. If the nested xcodebuild fails to resolve packages,\n# these lines turn a multi-thousand-line build log into a focused triage\n# view: what's set vs unset, whether the agent socket is actually a socket,\n# and what the parent's git url-rewrite config looks like. Cheap to print and\n# invaluable during a CI regression. DO NOT remove without a replacement.\necho \"info: nested-build env diagnostic\"\necho \"  CI               : ${CI:-<unset>}\"\necho \"  SSH_AUTH_SOCK    : ${SSH_AUTH_SOCK:-<unset>}\"\nif [ -n \"${SSH_AUTH_SOCK}\" ] && [ -S \"${SSH_AUTH_SOCK}\" ]; then\n    echo \"  ssh agent socket : reachable\"\nelif [ -n \"${SSH_AUTH_SOCK}\" ]; then\n    echo \"  ssh agent socket : SET BUT NOT A SOCKET (suspect)\"\nelse\n    echo \"  ssh agent socket : no agent (HTTPS clone path expected, fine on local dev)\"\nfi\necho \"  GIT_SSH_COMMAND  : ${GIT_SSH_COMMAND:-<unset>}\"\necho \"  GIT_SSH          : ${GIT_SSH:-<unset>}\"\necho \"  forwarded vars   : $* (excluding always-on HOME/PATH/USER/LOGNAME/TMPDIR/DEVELOPER_DIR)\"\necho \"  git insteadOf rules (parent env, applies to nested xcodebuild via HOME):\"\nINSTEADOF_RULES=$(/usr/bin/git config --get-regexp '^url\\..*\\.insteadof$' 2>/dev/null || true)\nif [ -n \"${INSTEADOF_RULES}\" ]; then\n    echo \"${INSTEADOF_RULES}\" | /usr/bin/sed 's/^/    /'\nelse\n    echo \"    <none>\"\nfi\n\nenv -i \\\n    HOME=\"${HOME}\" \\\n    PATH=\"${PATH}\" \\\n    USER=\"${USER}\" \\\n    LOGNAME=\"${LOGNAME:-${USER}}\" \\\n    TMPDIR=\"${TMPDIR:-/tmp/}\" \\\n    DEVELOPER_DIR=\"${DEVELOPER_DIR}\" \\\n    \"$@\" \\\n    xcodebuild \\\n        -project \"${TOOL_PROJECT}\" \\\n        -scheme \"guesswho-cli\" \\\n        -configuration \"${CONFIGURATION}\" \\\n        -destination \"generic/platform=macOS\" \\\n        -derivedDataPath \"${TOOL_DD}\" \\\n        CODE_SIGN_STYLE=Manual \\\n        CODE_SIGNING_REQUIRED=NO \\\n        CODE_SIGNING_ALLOWED=NO \\\n        SKIP_INSTALL=NO \\\n        build\n\nTOOL_BIN=\"${TOOL_DD}/Build/Products/${CONFIGURATION}/guesswho-cli\"\nif [ ! -x \"${TOOL_BIN}\" ]; then\n    echo \"error: guesswho-cli binary not produced at ${TOOL_BIN}\"\n    exit 1\nfi\n\n# Embed into GuessWho.app/Contents/MacOS/. The Catalyst app bundle layout\n# puts the helper next to the main executable, where\n# Bundle.main.url(forAuxiliaryExecutable:) finds it.\nDEST_DIR=\"${CODESIGNING_FOLDER_PATH}/Contents/MacOS\"\nmkdir -p \"${DEST_DIR}\"\n\nDEST_BIN=\"${DEST_DIR}/guesswho-cli\"\necho \"info: Embedding ${TOOL_BIN} -> ${DEST_BIN}\"\ncp -f \"${TOOL_BIN}\" \"${DEST_BIN}\"\nchmod +x \"${DEST_BIN}\"\n\nSIGN_IDENTITY=\"${EXPANDED_CODE_SIGN_IDENTITY:-${CODE_SIGN_IDENTITY}}\"\n\n# If the nested build linked any package products as shared dynamic\n# \"..._PackageProduct\" frameworks (Xcode 26 does this when a product is\n# consumed by multiple targets in a build graph), copy the macOS-built\n# variants next to the helper at Contents/Frameworks/CLI (the helper's rpath\n# -- see Config/guesswho-cli-Shared.xcconfig LD_RUNPATH_SEARCH_PATHS) and\n# re-sign each. The app's own Contents/Frameworks holds CATALYST variants,\n# which a native macOS Mach-O cannot load. The isolated single-target build\n# links everything statically today, making this a no-op -- it exists so a\n# future planner change fails loudly here instead of at dyld on launch.\nFW_SRC_DIR=\"${TOOL_DD}/Build/Products/${CONFIGURATION}/PackageFrameworks\"\nFW_DEST_DIR=\"${CODESIGNING_FOLDER_PATH}/Contents/Frameworks/CLI\"\nFW_LIST=$(otool -L \"${DEST_BIN}\" | /usr/bin/sed -n 's|.*@rpath/\\([^/]*_PackageProduct\\.framework\\).*|\\1|p' | sort -u)\nif [ -n \"${FW_LIST}\" ]; then\n    mkdir -p \"${FW_DEST_DIR}\"\n    echo \"${FW_LIST}\" | while read -r FW; do\n        if [ ! -d \"${FW_SRC_DIR}/${FW}\" ]; then\n            echo \"error: ${FW} not found at ${FW_SRC_DIR} - the helper links a package framework the nested build did not produce\" >&2\n            exit 1\n        fi\n        echo \"info: Embedding helper package framework ${FW} -> ${FW_DEST_DIR}\"\n        rm -rf \"${FW_DEST_DIR:?}/${FW}\"\n        cp -R \"${FW_SRC_DIR}/${FW}\" \"${FW_DEST_DIR}/${FW}\"\n        if [ -n \"${SIGN_IDENTITY}\" ]; then\n            /usr/bin/codesign --force --sign \"${SIGN_IDENTITY}\" \"${FW_DEST_DIR}/${FW}\"\n        fi\n    done\nelse\n    echo \"info: guesswho-cli is self-contained (no _PackageProduct framework dependencies)\"\nfi\n\n# Sign the embedded helper. The unsigned binary produced above (signing was\n# disabled in the nested xcodebuild) gets signed here with the host's\n# identity and entitlements so it inherits the same trust posture as\n# GuessWho.app itself.\n#\n# The helper's entitlements files use the $(GUESSWHO_CLI_APP_GROUP)\n# placeholder for the App Group. Xcode's\n# CODE_SIGN_ENTITLEMENTS_CONTENTS_TRANSFORMATION=expand-build-settings only\n# expands placeholders when Xcode itself signs the binary; here we invoke\n# /usr/bin/codesign directly from the parent (GuessWho) build context. The\n# app target's per-config xcconfig #includes the same\n# Config/CLIAppGroup-<config>.xcconfig the helper uses (INV-4), so\n# GUESSWHO_CLI_APP_GROUP is present -- and already fully expanded -- in this\n# script's environment. Expand it ourselves into a temp copy of the\n# entitlements file before passing it to codesign. Without this, the signed\n# binary embeds the literal \"$(GUESSWHO_CLI_APP_GROUP)\" string and the\n# sandbox denies access to the App Group container at runtime (EPERM on\n# mkfifo for the IPC pipes).\ncase \"${CONFIGURATION}\" in\n    *Debug*) RAW_ENTITLEMENTS_FILE=\"${SRCROOT}/guesswho-cli/guesswho-cli-Debug.entitlements\" ;;\n    *)       RAW_ENTITLEMENTS_FILE=\"${SRCROOT}/guesswho-cli/guesswho-cli-Release.entitlements\" ;;\nesac\nENTITLEMENTS_FILE=\"${TARGET_TEMP_DIR}/guesswho-cli.expanded.entitlements\"\nif [ -f \"${RAW_ENTITLEMENTS_FILE}\" ]; then\n    if [ -z \"${GUESSWHO_CLI_APP_GROUP}\" ]; then\n        echo \"error: GUESSWHO_CLI_APP_GROUP is empty - the app target's xcconfig must #include Config/CLIAppGroup-<config>.xcconfig (INV-4)\" >&2\n        exit 1\n    fi\n    /usr/bin/sed \\\n        -e \"s|\\$(GUESSWHO_CLI_APP_GROUP)|${GUESSWHO_CLI_APP_GROUP}|g\" \\\n        \"${RAW_ENTITLEMENTS_FILE}\" > \"${ENTITLEMENTS_FILE}\"\n\n    # Strip get-task-allow for non-Debug configurations. Distribution\n    # validation rejects any embedded binary that requests this entitlement.\n    # The Release entitlements file already omits it (this is defense in\n    # depth, mirroring Muse); the Debug file keeps it so the helper can be\n    # attached to a debugger during local development.\n    case \"${CONFIGURATION}\" in\n        *Debug*)\n            echo \"info: Keeping com.apple.security.get-task-allow for Debug configuration ${CONFIGURATION}\"\n            ;;\n        *)\n            echo \"info: Stripping com.apple.security.get-task-allow for distribution configuration ${CONFIGURATION}\"\n            # PlistBuddy returns 1 specifically when the key isn't present\n            # (benign -- the source already lacks it). Anything else is a real\n            # failure and should surface loudly under set -e.\n            /usr/libexec/PlistBuddy -c \"Delete :com.apple.security.get-task-allow\" \"${ENTITLEMENTS_FILE}\" 2>/dev/null || [ $? -eq 1 ]\n            ;;\n    esac\nfi\n\nif [ -n \"${SIGN_IDENTITY}\" ] && [ \"${SIGN_IDENTITY}\" != \"-\" ]; then\n    # Notarization requires a secure timestamp; the default codesign behavior\n    # contacts Apple's timestamp server. For local Debug builds we skip the\n    # timestamp so offline development still works.\n    case \"${CONFIGURATION}\" in\n        *Debug*) TIMESTAMP_FLAG=\"--timestamp=none\" ;;\n        *)       TIMESTAMP_FLAG=\"\" ;;\n    esac\n    echo \"info: Codesigning embedded guesswho-cli with identity ${SIGN_IDENTITY} (timestamp flag: ${TIMESTAMP_FLAG:-<default secure timestamp>})\"\n    if [ -f \"${ENTITLEMENTS_FILE}\" ]; then\n        /usr/bin/codesign --force --sign \"${SIGN_IDENTITY}\" --entitlements \"${ENTITLEMENTS_FILE}\" --options runtime ${TIMESTAMP_FLAG} \"${DEST_BIN}\"\n    else\n        /usr/bin/codesign --force --sign \"${SIGN_IDENTITY}\" --options runtime ${TIMESTAMP_FLAG} \"${DEST_BIN}\"\n    fi\nelif [ \"${SIGN_IDENTITY}\" = \"-\" ]; then\n    echo \"info: Ad-hoc signing embedded guesswho-cli\"\n    if [ -f \"${ENTITLEMENTS_FILE}\" ]; then\n        /usr/bin/codesign --force --sign - --entitlements \"${ENTITLEMENTS_FILE}\" \"${DEST_BIN}\"\n    else\n        /usr/bin/codesign --force --sign - \"${DEST_BIN}\"\n    fi\nelse\n    echo \"warning: No code-sign identity set; leaving embedded guesswho-cli unsigned (CODE_SIGN_IDENTITY=${CODE_SIGN_IDENTITY})\"\nfi\n";
